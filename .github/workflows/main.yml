name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' 

    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good

    - name: Install Core Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt 

    - name: Install Windows-Specific Dependencies
      if: runner.os == 'Windows'
      run: pip install kivy_deps.angle

    - name: Build with PyInstaller
      env:
        KIVY_GL_BACKEND: angle_sdl2
      run: pyinstaller --onefile --windowed --name Strelizia-HR-System main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Strelizia-HR-System-${{ matrix.os }}
        path: dist/Strelizia-HR-System*
