name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This adds a "Run workflow" button in GitHub so you can trigger it manually

jobs:
  build:
    # This matrix runs the job twice: once on Linux, once on Windows
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Adjust this to match your development environment
        
    - name: Install System Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base gstreamer1.0-plugins-good
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        # If you have external libraries (like Kivy), list them in a requirements.txt file
        pip install -r requirements.txt 

    - name: Build with PyInstaller
      # --onefile packages everything into a single binary
      # --windowed hides the console/terminal window when the app runs
      run: pyinstaller --onefile --windowed --name Strelizia-HR-System main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        # Appends the OS name to the download folder so you can tell them apart
        name: Strelizia-HR-System-${{ matrix.os }}
        path: dist/Strelizia-HR-System*
